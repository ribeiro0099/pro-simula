<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oficina de Redação — AprovacaoTotal</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #f5f7fb;
  margin: 0;
}
header {
  background: #7C3AED;
  color: #fff;
  padding: 18px;
  text-align: center;
  font-weight: 800;
  font-size: 20px;
}
.container {
  max-width: 1100px;
  margin: auto;
  padding: 30px 20px;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  margin-bottom: 20px;
}
h2 { margin-bottom: 10px; }
input, textarea {
  width: 100%;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 12px;
  font-size: 14px;
  margin-bottom: 15px;
  font-family: inherit;
}
textarea {
  height: 260px;
  resize: vertical;
}
button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg,#7C3AED,#5B21B6);
  color: white;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
}
button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(124,58,237,0.3);
}
button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}
.loading {
  text-align: center;
  font-weight: 600;
  color: #555;
  padding: 30px;
}
.score {
  font-size: 48px;
  font-weight: 800;
  color: #7C3AED;
}
.badge {
  display: inline-block;
  padding: 5px 12px;
  border-radius: 50px;
  background: #ede9fe;
  color: #5B21B6;
  font-weight: 700;
  margin-top: 5px;
}
.section { margin-top: 20px; }
.section h4 { margin-bottom: 8px; }
.item {
  background: #f9fafb;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 8px;
}
.error { background: #fee2e2; color: #7f1d1d; }
.good { background: #dcfce7; color: #065f46; }
.erro-msg {
  background: #fee2e2;
  color: #7f1d1d;
  border-radius: 10px;
  padding: 16px;
  font-weight: 600;
}
</style>
</head>
<body>

<header>AprovaçãoTotal ✍️</header>

<div class="container">

  <div class="card">
    <h2>Oficina de Redação</h2>
    <input type="text" id="red-tema" placeholder="Tema da redação">
    <textarea id="red-texto" placeholder="Digite sua redação..."></textarea>
    <button id="btn-corrigir" onclick="corrigirRedacao()">🔍 Corrigir com IA</button>
  </div>

  <div id="resultado"></div>

</div>

<script>
// Aponta para o backend local. Em produção, troque pela URL do seu servidor.
// ── URL do backend vem do localStorage (configurada uma vez) ──
let _backendUrl = localStorage.getItem('backend_url') || '';
function getUrl() {
  if (_backendUrl) return _backendUrl.replace(/\/$/, '') + '/redacao';
  const u = prompt('Cole a URL do backend (ex: https://meu-app.onrender.com):') || '';
  if (!u) throw new Error('URL não configurada.');
  _backendUrl = u.replace(/\/$/, '');
  localStorage.setItem('backend_url', _backendUrl);
  return _backendUrl + '/redacao';
}
const BACKEND_URL = null; // não usado — usa getUrl()

async function corrigirRedacao() {
  const texto = document.getElementById("red-texto").value.trim();
  const tema = document.getElementById("red-tema").value.trim() || "não informado";
  const resultado = document.getElementById("resultado");
  const btn = document.getElementById("btn-corrigir");

  if (texto.length < 50) {
    alert("Digite pelo menos 50 caracteres.");
    return;
  }

  btn.disabled = true;
  resultado.innerHTML = `<div class="card loading">⏳ Analisando sua redação, aguarde...</div>`;

  try {
    const response = await fetch(getUrl(), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ texto, tema })
    });

    const r = await response.json();

    if (!response.ok) {
      throw new Error(r.erro || `Erro HTTP ${response.status}`);
    }

    resultado.innerHTML = `
    <div class="card">

      <div class="score">${r.nota_total}</div>
      <div class="badge">${r.conceito}</div>

      <div class="section">
        <h4>📊 Competências</h4>
        ${r.competencias.map(c => `
          <div class="item">
            ${c.nome} — <strong>${c.nota}/${c.max}</strong>
          </div>
        `).join("")}
      </div>

      <div class="section">
        <h4>❌ Erros encontrados</h4>
        ${r.erros.length > 0
          ? r.erros.map(e => `
              <div class="item error">
                <b>${e.tipo}:</b> ${e.descricao}
              </div>
            `).join("")
          : '<div class="item good">Nenhum erro significativo encontrado!</div>'
        }
      </div>

      <div class="section">
        <h4>✅ Pontos positivos</h4>
        <div class="item good">${r.pontos_positivos}</div>
      </div>

      <div class="section">
        <h4>💡 Como melhorar</h4>
        <div class="item">${r.sugestao_melhoria}</div>
      </div>

    </div>
    `;

  } catch (e) {
    console.error(e);
    resultado.innerHTML = `<div class="card erro-msg">❌ Erro ao processar: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
  }
}
</script>

</body>
</html>
